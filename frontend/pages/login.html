<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — DataVault</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#07070d;--surface:#0f0f18;--border:rgba(255,255,255,0.07);--accent:#00e5a0;--accent2:#7c6dfa;--text:#f0efe8;--muted:rgba(240,239,232,0.45);--card:#13131e;--error:#ff6b6b}
    body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:grid;place-items:center;padding:2rem}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%, rgba(0,229,160,0.06) 0%, transparent 60%), radial-gradient(ellipse at 80% 50%, rgba(124,109,250,0.06) 0%, transparent 60%);pointer-events:none}
    .card{background:var(--card);border:0.5px solid var(--border);border-radius:20px;padding:2.5rem;width:100%;max-width:420px;animation:fadeUp 0.5s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:800;margin-bottom:2rem;text-decoration:none;color:var(--text)}
    .logo-box{width:28px;height:28px;background:var(--accent);border-radius:6px;display:grid;place-items:center}
    h1{font-size:24px;font-weight:800;letter-spacing:-0.5px;margin-bottom:0.4rem}
    .subtitle{font-size:13px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:2rem}
    .tabs{display:flex;background:var(--surface);border-radius:10px;padding:4px;margin-bottom:2rem}
    .tab{flex:1;padding:9px;text-align:center;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;border:none;background:transparent;color:var(--muted);font-family:'Syne',sans-serif}
    .tab.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
    .field{margin-bottom:1.25rem}
    label{display:block;font-size:12px;font-weight:600;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:6px;letter-spacing:0.5px}
    input{width:100%;background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;outline:none;transition:border-color 0.2s}
    input:focus{border-color:var(--accent)}
    input::placeholder{color:var(--muted)}
    .btn{width:100%;background:var(--accent);color:#07070d;border:none;border-radius:8px;padding:13px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.2s,transform 0.1s;margin-top:0.5rem}
    .btn:hover{opacity:0.87;transform:translateY(-1px)}
    .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
    .error{background:rgba(255,107,107,0.1);border:0.5px solid rgba(255,107,107,0.3);color:var(--error);font-family:'DM Mono',monospace;font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:1rem;display:none}
    .divider{text-align:center;font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;margin:1.25rem 0}
    .link-row{text-align:center;font-size:13px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1.25rem}
    .link-row a{color:var(--accent);text-decoration:none;font-weight:500}
    .success{background:rgba(0,229,160,0.1);border:0.5px solid rgba(0,229,160,0.3);color:var(--accent);font-family:'DM Mono',monospace;font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:1rem;display:none}
  </style>
</head>
<body>
<div class="card">
  <a href="../index.html" class="logo">
    <div class="logo-box">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="2" width="12" height="12" rx="2" stroke="#07070d" stroke-width="1.5"/>
        <path d="M5 8h6M8 5v6" stroke="#07070d" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    DataVault
  </a>
  <h1>Welcome back</h1>
  <p class="subtitle">Login to your vault</p>

  <div class="tabs">
    <button class="tab active" onclick="setType('user', this)">👤 User</button>
    <button class="tab" onclick="setType('brand', this)">🏢 Brand</button>
  </div>

  <div class="error" id="error-msg"></div>
  <div class="success" id="success-msg"></div>

  <div class="field">
    <label>EMAIL</label>
    <input type="email" id="email" placeholder="arjun@example.com"/>
  </div>
  <div class="field">
    <label>PASSWORD</label>
    <input type="password" id="password" placeholder="••••••••"/>
  </div>
  <button class="btn" id="login-btn" onclick="doLogin()">Login →</button>

  <div class="link-row">
    Don't have an account? <a href="register.html">Sign up free</a>
  </div>
</div>

<script>
  let accountType = 'user';

  function setType(type, el) {
    accountType = type;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('error-msg');
    const okEl = document.getElementById('success-msg');

    errEl.style.display = 'none';
    okEl.style.display = 'none';

    if (!email || !password) {
      errEl.textContent = 'Please fill in all fields.';
      errEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Logging in...';

    try {
      const res = await fetch(`https://datavault-api.onrender.com/auth/login/${accountType}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) {
        errEl.textContent = data.detail || 'Login failed.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Login →';
        return;
      }

      localStorage.setItem('token', data.access_token);
      localStorage.setItem('account_type', accountType);
      localStorage.setItem('user_name', data.name);

      okEl.textContent = `Welcome back, ${data.name}! Redirecting...`;
      okEl.style.display = 'block';

      setTimeout(() => {
        if (accountType === 'user') {
          window.location.href = 'user-dashboard.html';
        } else {
          window.location.href = 'brand-dashboard.html';
        }
      }, 800);

    } catch (err) {
      errEl.textContent = 'Cannot connect to server. Is the backend running?';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Login →';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
